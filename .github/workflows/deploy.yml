name: Deploy to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages.
#
# NOT the active deploy path. This needs repo Settings → Actions → General →
# "Allow all actions and reusable workflows" (otherwise the build job can't get a
# runner) AND Pages Source = "GitHub Actions". The app currently ships via the
# gh-pages branch — see scripts/deploy-ghpages.sh and README → Deployment.
#
# Manual-only so it doesn't auto-fail on every push. To switch to CI deploys:
# enable the Actions permission above, set Pages Source = GitHub Actions, then
# add `push: { branches: [main] }` back here.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
